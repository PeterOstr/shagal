services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: mailkb-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./project/sql:/docker-entrypoint-initdb.d:ro
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: mailkb
      CLICKHOUSE_USER: peter
      CLICKHOUSE_PASSWORD: 1234
    restart: unless-stopped
    networks: [llmnet]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.15
    container_name: mailkb-qdrant
    volumes:
      - qdrant_data:/qdrant/storage:z
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped
    networks: [llmnet]

  vllm:
    image: vllm/vllm-openai:latest
    container_name: mailkb-vllm
    command: >
      --model Qwen/Qwen3-Embedding-0.6B
      --dtype auto
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.60
      --download-dir /models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_LOGGING_LEVEL=INFO
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
    ports:
      - "8000:8000"
    runtime: nvidia
    volumes:
      - ./backend/models:/models
      - ./backend/hf-cache:/root/.cache/huggingface
      - ./backend/triton-cache:/root/.triton
      - ./backend/torch-cache:/root/.cache/torch
      - /usr/lib/wsl:/usr/lib/wsl:ro
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks: [llmnet]

  api:
    build:
      context: ./project
      dockerfile: Dockerfile
    container_name: mailkb-api
    ports:
      - "8010:8010"
    environment:
      - CH_HOST=clickhouse
      - CH_PORT=8123
      - CLICKHOUSE_USER=peter
      - CLICKHOUSE_PASSWORD=1234
      - CLICKHOUSE_DATABASE=mailkb
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDINGS_BASE_URL=http://vllm:8000/v1
      - EMBEDDINGS_MODEL=Qwen/Qwen3-Embedding-0.6B
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - SUMMARY_DIR=/app/summaries
    volumes:
      - summaries_data:/app/summaries
    depends_on:
      clickhouse:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped
    networks: [llmnet]

  ui:
    build:
      context: ./project/ui
      dockerfile: Dockerfile.ui
    container_name: mailkb-ui
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://api:8010
      - PORT=8501
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks: [llmnet]

  ui-test:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: mailkb-ui-test
    working_dir: /app
    volumes:
      - ./project/ui:/app
    environment:
      - HEADED=0
    depends_on:
      api:
        condition: service_started
    command: ["sh", "-c", "npm install --include=dev 2>&1 && node tests/ui.spec.js"]
    networks: [llmnet]

volumes:
  clickhouse_data:
  qdrant_data:
  summaries_data:

networks:
  llmnet:
    driver: bridge

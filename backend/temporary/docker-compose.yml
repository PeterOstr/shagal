services:
  qdrant:
    image: qdrant/qdrant:v1.15
    container_name: qdrant-agents
    volumes:
      - ./backend/vectorstore/qdrant_data:/qdrant/storage:z
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped
    networks: [llmnet]

  vllm:
    image: vllm/vllm-openai:latest
    command: >
      --model Qwen/Qwen3-Embedding-0.6B
      --dtype auto
      --host 0.0.0.0
      --port 8000
      --gpu-memory-utilization 0.60
      --download-dir /models
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_LOGGING_LEVEL=INFO
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
    ports:
      - "8000:8000"
    runtime: nvidia
    volumes:
      - ./models:/models
      - ./hf-cache:/root/.cache/huggingface
      - ./triton-cache:/root/.triton
      - ./torch-cache:/root/.cache/torch
      - /usr/lib/wsl:/usr/lib/wsl:ro
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped
    networks: [llmnet]

  api:
    build:
      context: ..
      dockerfile: backend/Dockerfile.api
    container_name: shagal-api
    env_file:
      - ../.env
    ports:
      - "8001:8001"
    depends_on:
      - qdrant
      - vllm
    restart: unless-stopped
    networks: [llmnet]

volumes:
  qdrant_data: {}

networks:
  llmnet:
    driver: bridge
